name: OKX RSI Telegram Alert

on:
  schedule:
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:
    inputs:
      test_only:
        description: "Chỉ gửi tin nhắn kiểm tra Telegram"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: okx-rsi-alert
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Quét RSI và gửi Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_ONLY: ${{ inputs.test_only }}
        run: python rsi_alert.py 
